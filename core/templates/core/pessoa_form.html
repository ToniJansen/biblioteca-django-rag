{% extends 'core/base.html' %}
{% load bootstrap5 %}
{% block title %}Pessoa{% endblock %}
{% block content %}
<h2>{% if form.instance.pk %}Editar{% else %}Nova{% endif %} Pessoa</h2>
<form method="POST" class="mt-3">
    {% csrf_token %}
    {% bootstrap_form form %}
    <button type="submit" class="btn btn-success">Salvar</button>
    <a href="{% url 'pessoa_menu_alias' %}" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
