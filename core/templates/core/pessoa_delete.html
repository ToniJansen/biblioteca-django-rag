{% extends 'core/base.html' %}
{% block title %}Excluir Pessoa{% endblock %}
{% block content %}
<h2>Excluir Pessoa</h2>
<div class="alert alert-warning">Confirma a exclusao de <strong>{{ object.nome }}</strong>?</div>
<form method="POST">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Sim, excluir</button>
    <a href="{% url 'pessoa_menu_alias' %}" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
